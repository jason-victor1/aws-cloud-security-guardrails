name: Python Validate

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-validate:
    name: Python automation syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate Python automation scripts
        run: python3 -m py_compile automation/*.py
